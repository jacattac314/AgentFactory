<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermes Agent Factory</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #6c63ff;
      --accent2: #48d1cc;
      --green: #3ecf8e;
      --red: #f87171;
      --yellow: #fbbf24;
      --text: #e2e8f0;
      --muted: #64748b;
      --font: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); }

    /* ── Layout ── */
    .layout { display: grid; grid-template-columns: 280px 1fr; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 20px 18px 14px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h1 { font-size: 15px; font-weight: 700; letter-spacing: .3px; color: var(--text); }
    .sidebar-header p  { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .agent-list { flex: 1; overflow-y: auto; padding: 10px 8px; }
    .agent-card {
      padding: 12px 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 4px;
      border: 1px solid transparent;
      transition: background .15s, border-color .15s;
    }
    .agent-card:hover  { background: var(--surface2); }
    .agent-card.active { background: var(--surface2); border-color: var(--accent); }
    .agent-card-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 5px; }
    .agent-card-meta { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge {
      font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: .4px;
    }
    .badge-template  { background: #2d2763; color: var(--accent); }
    .badge-enabled   { background: #0d3d28; color: var(--green); }
    .badge-disabled  { background: #2d1c1c; color: var(--red); }

    /* ── Main chat area ── */
    .main { display: flex; flex-direction: column; overflow: hidden; }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .chat-header-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .chat-header-info h2 { font-size: 15px; font-weight: 700; }
    .chat-header-info p  { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .chat-header-badges  { margin-left: auto; display: flex; gap: 6px; align-items: center; }

    .dry-run-toggle {
      display: flex; align-items: center; gap: 7px;
      font-size: 11px; color: var(--muted); cursor: pointer;
    }
    .dry-run-toggle input { accent-color: var(--accent); cursor: pointer; }

    /* ── Messages ── */
    .messages {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 16px;
    }

    .msg { display: flex; gap: 10px; max-width: 780px; }
    .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg.agent { align-self: flex-start; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; margin-top: 2px;
    }
    .msg.user  .msg-avatar { background: var(--accent); }
    .msg.agent .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }

    .msg-body { display: flex; flex-direction: column; gap: 4px; }
    .msg-bubble {
      padding: 11px 15px; border-radius: 12px;
      font-size: 13.5px; line-height: 1.6; max-width: 660px;
    }
    .msg.user  .msg-bubble { background: var(--accent); color: #fff; border-top-right-radius: 3px; }
    .msg.agent .msg-bubble { background: var(--surface2); color: var(--text); border-top-left-radius: 3px; }

    .msg-bubble strong { font-weight: 700; }
    .msg-bubble em     { color: var(--muted); font-style: italic; }
    .msg-bubble ul     { padding-left: 18px; margin-top: 6px; }
    .msg-bubble li     { margin-bottom: 3px; }

    .planned-actions {
      margin-top: 10px; padding: 10px 13px;
      background: #0f1a2e; border: 1px solid #1e3a5f;
      border-radius: 8px; font-family: var(--mono);
      font-size: 11.5px; color: var(--accent2);
    }
    .planned-actions .pa-title { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; font-family: var(--font); }
    .planned-actions .pa-item  { display: flex; gap: 6px; align-items: flex-start; margin-bottom: 3px; }
    .planned-actions .pa-item::before { content: '→'; color: var(--accent); flex-shrink: 0; }

    .status-chip {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; padding: 2px 8px; border-radius: 20px;
      font-weight: 600; letter-spacing: .3px; align-self: flex-start;
    }
    .status-dry_run { background: #1e2d4a; color: var(--accent2); }
    .status-skipped { background: #2d2420; color: var(--yellow); }
    .status-error   { background: #2d1c1c; color: var(--red); }

    .msg-time { font-size: 10px; color: var(--muted); padding: 0 4px; }

    /* ── Empty state ── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; color: var(--muted);
    }
    .empty-state .icon { font-size: 48px; opacity: .4; }
    .empty-state h3    { font-size: 16px; font-weight: 600; color: var(--text); }
    .empty-state p     { font-size: 13px; max-width: 320px; text-align: center; }

    /* ── Input bar ── */
    .input-bar {
      padding: 16px 24px; border-top: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
      display: flex; gap: 10px; align-items: flex-end;
    }
    .input-bar textarea {
      flex: 1; resize: none; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: var(--font); font-size: 13.5px;
      padding: 11px 14px; outline: none; max-height: 120px;
      transition: border-color .15s;
    }
    .input-bar textarea:focus { border-color: var(--accent); }
    .input-bar textarea::placeholder { color: var(--muted); }
    .send-btn {
      width: 40px; height: 40px; border-radius: 10px; border: none; cursor: pointer;
      background: var(--accent); color: #fff; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .1s; flex-shrink: 0;
    }
    .send-btn:hover   { background: #7c74ff; }
    .send-btn:active  { transform: scale(.95); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; }

    /* ── Loading ── */
    .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing span {
      width: 6px; height: 6px; background: var(--muted); border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,60%,100%{ transform:translateY(0) } 30%{ transform:translateY(-5px) } }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── No agent selected ── */
    .no-selection { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--muted); }
    .no-selection .big { font-size: 56px; }
    .no-selection h2 { font-size: 18px; font-weight: 700; color: var(--text); }
    .no-selection p  { font-size: 13px; }
  </style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>⚗️ Hermes Factory</h1>
      <p>Select an agent to chat with</p>
    </div>
    <div class="agent-list" id="agentList">
      <div style="padding:12px;color:var(--muted);font-size:12px;">Loading agents…</div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <div class="no-selection">
      <div class="big">🤖</div>
      <h2>No agent selected</h2>
      <p>Pick an agent from the sidebar to start chatting.</p>
    </div>
  </main>

</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let agents = [];
let activeSlug = null;
let histories = {};   // slug → [{role, content, planned, status, time}]
let dryRun = true;

// ── Boot ──────────────────────────────────────────────────────────────────
async function boot() {
  const res = await fetch('/api/agents');
  const data = await res.json();
  agents = data.agents;
  renderSidebar();
}

// ── Sidebar ───────────────────────────────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById('agentList');
  if (!agents.length) {
    el.innerHTML = '<div style="padding:12px;color:var(--muted);font-size:12px;">No agents found. Run<br><code>hermes factory create "..."</code></div>';
    return;
  }
  el.innerHTML = agents.map(a => `
    <div class="agent-card ${a.slug === activeSlug ? 'active' : ''}" onclick="selectAgent('${a.slug}')">
      <div class="agent-card-name">${a.name}</div>
      <div class="agent-card-meta">
        <span class="badge badge-template">${a.template_name.replace('_agent','')}</span>
        <span class="badge ${a.enabled ? 'badge-enabled' : 'badge-disabled'}">${a.enabled ? 'enabled' : 'disabled'}</span>
      </div>
    </div>
  `).join('');
}

// ── Select agent ──────────────────────────────────────────────────────────
function selectAgent(slug) {
  activeSlug = slug;
  if (!histories[slug]) histories[slug] = [];
  renderSidebar();
  renderMain();
}

// ── Main area ─────────────────────────────────────────────────────────────
function renderMain() {
  const agent = agents.find(a => a.slug === activeSlug);
  const main = document.getElementById('main');

  const allowedTools = Object.entries(agent.allowed_tools || {})
    .map(([s, ops]) => `${s}: ${ops.join(', ')}`).join(' · ') || 'none';

  main.innerHTML = `
    <div class="chat-header">
      <div class="chat-header-icon">🤖</div>
      <div class="chat-header-info">
        <h2>${agent.name}</h2>
        <p>${agent.description || agent.template_name}</p>
      </div>
      <div class="chat-header-badges">
        <span class="badge ${agent.enabled ? 'badge-enabled' : 'badge-disabled'}" style="font-size:11px">
          ${agent.enabled ? '● enabled' : '○ disabled'}
        </span>
        <label class="dry-run-toggle">
          <input type="checkbox" id="dryRunToggle" ${dryRun ? 'checked' : ''} onchange="toggleDryRun(this)">
          dry-run
        </label>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <textarea id="msgInput" rows="1" placeholder="Ask the agent something…"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">➤</button>
    </div>
  `;

  renderMessages();
  if (!histories[activeSlug].length) {
    appendSystemMessage(agent);
  }
  document.getElementById('msgInput').focus();
}

function appendSystemMessage(agent) {
  const allowed = Object.entries(agent.allowed_tools || {})
    .map(([s, ops]) => `**${s}**: ${ops.join(', ')}`).join('\n') || '_none_';
  const denied  = Object.entries(agent.denied_tools || {})
    .map(([s, ops]) => `**${s}**: ${ops.join(', ')}`).join('\n') || '_none_';

  histories[activeSlug].push({
    role: 'agent',
    content: `👋 Hi! I'm **${agent.name}**.\n\nI operate in **dry-run mode** by default — I'll show you what I *would* do without touching anything real.\n\n**Allowed tools**\n${allowed}\n\n**Denied tools** _(always blocked)_\n${denied}`,
    planned: [],
    status: null,
    time: now(),
  });
  renderMessages();
}

// ── Messages ──────────────────────────────────────────────────────────────
function renderMessages() {
  const el = document.getElementById('messages');
  if (!el) return;
  const history = histories[activeSlug] || [];

  if (!history.length) {
    el.innerHTML = '';
    return;
  }

  el.innerHTML = history.map(m => buildMsgHTML(m)).join('');
  el.scrollTop = el.scrollHeight;
}

function buildMsgHTML(m) {
  const avatar = m.role === 'user' ? '🧑' : '🤖';
  const bodyContent = renderMarkdown(m.content);

  let extra = '';
  if (m.planned && m.planned.length) {
    const items = m.planned.map(p => `<div class="pa-item">${p}</div>`).join('');
    extra = `<div class="planned-actions"><div class="pa-title">Planned actions</div>${items}</div>`;
  }
  let statusChip = '';
  if (m.status) {
    statusChip = `<span class="status-chip status-${m.status}">${m.status.replace('_',' ')}</span>`;
  }

  return `
    <div class="msg ${m.role}">
      <div class="msg-avatar">${avatar}</div>
      <div class="msg-body">
        <div class="msg-bubble">${bodyContent}</div>
        ${extra}
        <div style="display:flex;gap:8px;align-items:center">
          ${statusChip}
          <span class="msg-time">${m.time || ''}</span>
        </div>
      </div>
    </div>
  `;
}

function renderMarkdown(text) {
  // Minimal markdown: bold, italic, bullet lists, line breaks
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/_(.+?)_/g, '<em>$1</em>')
    .replace(/^• (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
    .replace(/\n/g, '<br>');
}

// ── Send ──────────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !activeSlug) return;

  input.value = '';
  autoResize(input);

  // Add user message
  histories[activeSlug].push({ role: 'user', content: text, planned: [], status: null, time: now() });
  renderMessages();

  // Show typing indicator
  const messagesEl = document.getElementById('messages');
  const typingId = 'typing-' + Date.now();
  messagesEl.innerHTML += `
    <div id="${typingId}" class="msg agent">
      <div class="msg-avatar">🤖</div>
      <div class="msg-body">
        <div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>
      </div>
    </div>`;
  messagesEl.scrollTop = messagesEl.scrollHeight;
  document.getElementById('sendBtn').disabled = true;

  try {
    const res = await fetch(`/api/agents/${activeSlug}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, dry_run: dryRun }),
    });
    const data = await res.json();

    document.getElementById(typingId)?.remove();

    histories[activeSlug].push({
      role: 'agent',
      content: data.content,
      planned: data.planned_actions || [],
      status: data.status,
      time: now(),
    });
  } catch(e) {
    document.getElementById(typingId)?.remove();
    histories[activeSlug].push({
      role: 'agent', content: `⚠️ Error: ${e.message}`, planned: [], status: 'error', time: now(),
    });
  }

  renderMessages();
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('msgInput')?.focus();
}

// ── Helpers ───────────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function toggleDryRun(el) {
  dryRun = el.checked;
}

function now() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ── Start ─────────────────────────────────────────────────────────────────
boot();
</script>
</body>
</html>
