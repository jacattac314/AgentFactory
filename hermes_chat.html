<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermes Agent Factory</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3350;
      --accent:#6c63ff; --accent2:#48d1cc; --green:#3ecf8e; --red:#f87171;
      --yellow:#fbbf24; --text:#e2e8f0; --muted:#64748b;
      --font:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono','Fira Code',monospace;
    }
    html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);}
    .layout{display:grid;grid-template-columns:280px 1fr;height:100vh;overflow:hidden;}
    .sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
    .sidebar-header{padding:20px 18px 14px;border-bottom:1px solid var(--border);}
    .sidebar-header h1{font-size:15px;font-weight:700;letter-spacing:.3px;}
    .sidebar-header p{font-size:11px;color:var(--muted);margin-top:3px;}
    .agent-list{flex:1;overflow-y:auto;padding:10px 8px;}
    .agent-card{padding:12px;border-radius:8px;cursor:pointer;margin-bottom:4px;border:1px solid transparent;transition:background .15s,border-color .15s;}
    .agent-card:hover{background:var(--surface2);}
    .agent-card.active{background:var(--surface2);border-color:var(--accent);}
    .agent-card-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:5px;}
    .agent-card-meta{display:flex;gap:6px;flex-wrap:wrap;}
    .badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px;}
    .badge-template{background:#2d2763;color:var(--accent);}
    .badge-enabled{background:#0d3d28;color:var(--green);}
    .badge-disabled{background:#2d1c1c;color:var(--red);}
    .main{display:flex;flex-direction:column;overflow:hidden;}
    .chat-header{padding:16px 24px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:12px;flex-shrink:0;}
    .chat-header-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
    .chat-header-info h2{font-size:15px;font-weight:700;}
    .chat-header-info p{font-size:11px;color:var(--muted);margin-top:2px;}
    .chat-header-badges{margin-left:auto;display:flex;gap:8px;align-items:center;}
    .dry-run-toggle{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);cursor:pointer;user-select:none;}
    .dry-run-toggle input{accent-color:var(--accent);cursor:pointer;}
    .messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;}
    .msg{display:flex;gap:10px;max-width:780px;}
    .msg.user{align-self:flex-end;flex-direction:row-reverse;}
    .msg.agent{align-self:flex-start;}
    .msg-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px;}
    .msg.user .msg-avatar{background:var(--accent);}
    .msg.agent .msg-avatar{background:linear-gradient(135deg,var(--accent),var(--accent2));}
    .msg-body{display:flex;flex-direction:column;gap:4px;}
    .msg-bubble{padding:11px 15px;border-radius:12px;font-size:13.5px;line-height:1.6;max-width:660px;}
    .msg.user .msg-bubble{background:var(--accent);color:#fff;border-top-right-radius:3px;}
    .msg.agent .msg-bubble{background:var(--surface2);color:var(--text);border-top-left-radius:3px;}
    .msg-bubble strong{font-weight:700;}
    .msg-bubble em{color:var(--muted);font-style:italic;}
    .planned-actions{margin-top:10px;padding:10px 13px;background:#0f1a2e;border:1px solid #1e3a5f;border-radius:8px;font-family:var(--mono);font-size:11.5px;color:var(--accent2);}
    .planned-actions .pa-title{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-family:var(--font);}
    .planned-actions .pa-item{display:flex;gap:6px;align-items:flex-start;margin-bottom:3px;}
    .planned-actions .pa-item::before{content:'→';color:var(--accent);flex-shrink:0;}
    .status-chip{display:inline-flex;align-items:center;gap:5px;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;letter-spacing:.3px;align-self:flex-start;}
    .status-dry_run{background:#1e2d4a;color:var(--accent2);}
    .msg-time{font-size:10px;color:var(--muted);padding:0 4px;}
    .typing{display:flex;gap:4px;align-items:center;padding:4px 0;}
    .typing span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bounce .9s infinite;}
    .typing span:nth-child(2){animation-delay:.15s;}
    .typing span:nth-child(3){animation-delay:.3s;}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
    .input-bar{padding:16px 24px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;display:flex;gap:10px;align-items:flex-end;}
    .input-bar textarea{flex:1;resize:none;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:13.5px;padding:11px 14px;outline:none;max-height:120px;transition:border-color .15s;}
    .input-bar textarea:focus{border-color:var(--accent);}
    .input-bar textarea::placeholder{color:var(--muted);}
    .send-btn{width:40px;height:40px;border-radius:10px;border:none;cursor:pointer;background:var(--accent);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .1s;flex-shrink:0;}
    .send-btn:hover{background:#7c74ff;}
    .send-btn:active{transform:scale(.95);}
    .no-selection{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);}
    .no-selection .big{font-size:56px;}
    .no-selection h2{font-size:18px;font-weight:700;color:var(--text);}
    .no-selection p{font-size:13px;}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>⚗️ Hermes Factory</h1>
      <p>Select an agent to chat with</p>
    </div>
    <div class="agent-list" id="agentList"></div>
  </aside>
  <main class="main" id="main">
    <div class="no-selection">
      <div class="big">🤖</div>
      <h2>No agent selected</h2>
      <p>Pick an agent from the sidebar to start chatting.</p>
    </div>
  </main>
</div>

<script>
// ── Embedded agent data (generated from registry.yaml) ───────────────────────
const AGENTS = [
  {
    "slug": "an_agent_that_summarizes_my_gmail_and_posts_agent",
    "name": "An Agent That Summarizes My Gmail And Posts Agent",
    "enabled": true,
    "template_name": "briefing_agent",
    "version": "0.1.0",
    "description": "Auto-generated agent: Create an agent that summarizes my Gmail and posts a morning brief to Slack",
    "allowed_tools": {"gmail": ["search","read"],"slack": ["post_message","read_channel"]},
    "denied_tools": {"gmail": ["send","delete","modify_labels","create_draft"],"slack": ["delete_message","invite_users","create_channel"],"shell": ["execute","run_command","eval"],"filesystem": ["delete","write_sensitive","unlink","rmtree"],"package_manager": ["install","uninstall","upgrade"],"cloud": ["deploy","provision","destroy"]},
    "approval_required_for": ["sending_email","deleting_files","modifying_code","installing_packages","cloud_deployment","posting_to_external_services"]
  },
  {
    "slug": "watch_my_slack_channel_for_risk_alerts_and_agent",
    "name": "Watch My Slack Channel For Risk Alerts And Agent",
    "enabled": false,
    "template_name": "monitor_agent",
    "version": "0.1.0",
    "description": "Auto-generated agent: Watch my Slack channel for risk alerts and notify me",
    "allowed_tools": {"slack": ["post_message","read_channel"]},
    "denied_tools": {"slack": ["delete_message","invite_users","create_channel"],"shell": ["execute","run_command","eval"],"filesystem": ["delete","write_sensitive","unlink","rmtree"],"package_manager": ["install","uninstall","upgrade"],"cloud": ["deploy","provision","destroy"]},
    "approval_required_for": ["sending_email","deleting_files","modifying_code","installing_packages","cloud_deployment","posting_to_external_services"]
  },
  {
    "slug": "research_web_sources_and_write_a_weekly_report_agent",
    "name": "Research Web Sources And Write A Weekly Report Agent",
    "enabled": false,
    "template_name": "research_agent",
    "version": "0.1.0",
    "description": "Auto-generated agent: Research web sources and write a weekly report",
    "allowed_tools": {"web": ["fetch_url","search"]},
    "denied_tools": {"shell": ["execute","run_command","eval"],"filesystem": ["delete","write_sensitive","unlink","rmtree"],"package_manager": ["install","uninstall","upgrade"],"cloud": ["deploy","provision","destroy"]},
    "approval_required_for": ["sending_email","deleting_files","modifying_code","installing_packages","cloud_deployment","posting_to_external_services"]
  }
];

// ── Simulate workflow logic (mirrors workflow.py dry-run behaviour) ───────────
function simulateWorkflow(agent, userMessage) {
  const tools = agent.allowed_tools || {};
  const planned = [];

  if (agent.template_name === 'briefing_agent') {
    if (tools.gmail)    { planned.push('gmail.search — find relevant messages'); planned.push('gmail.read — read message content'); }
    if (tools.calendar) { planned.push('calendar.read_events — fetch upcoming events'); }
    if (tools.web)      { planned.push('web.search — gather supporting information'); }
    planned.push('compose — synthesise information into a brief');
    if (tools.slack)    { planned.push('slack.post_message — post brief to channel'); }
  } else if (agent.template_name === 'monitor_agent') {
    if (tools.slack) { planned.push('slack.read_channel — scan for flagged messages'); }
    if (tools.gmail) { planned.push('gmail.search — search for trigger keywords'); planned.push('gmail.read — read flagged message content'); }
    planned.push('evaluate — classify events by severity');
    if (tools.slack) { planned.push('slack.post_message — send alert summary'); }
  } else if (agent.template_name === 'research_agent') {
    if (tools.web)   { planned.push('web.search — search for relevant sources'); planned.push('web.fetch_url — retrieve source content'); }
    if (tools.gmail) { planned.push('gmail.search — search for relevant documents'); planned.push('gmail.read — read document content'); }
    planned.push('synthesise — extract key findings and build report');
    if (tools.slack) { planned.push('slack.post_message — post research report'); }
  }

  const keywords = userMessage.toLowerCase();
  const contextual = [];
  if (/gmail|email|inbox|message/.test(keywords) && tools.gmail)
    contextual.push(`gmail.search — searching for "${userMessage.substring(0,40)}..."`);
  if (/slack|post|channel/.test(keywords) && tools.slack)
    contextual.push('slack.post_message — posting result to channel');
  if (/search|research|find|look/.test(keywords) && tools.web)
    contextual.push(`web.search — searching for "${userMessage.substring(0,40)}..."`);

  return {
    status: 'dry_run',
    planned_actions: contextual.length ? contextual : planned,
    message: 'No external actions were performed. This was a dry run.',
  };
}

// ── State ─────────────────────────────────────────────────────────────────────
let activeSlug = null;
let histories = {};
let dryRun = true;

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  document.getElementById('agentList').innerHTML = AGENTS.map(a => `
    <div class="agent-card ${a.slug === activeSlug ? 'active' : ''}" onclick="selectAgent('${a.slug}')">
      <div class="agent-card-name">${a.name}</div>
      <div class="agent-card-meta">
        <span class="badge badge-template">${a.template_name.replace('_agent','')}</span>
        <span class="badge ${a.enabled ? 'badge-enabled':'badge-disabled'}">${a.enabled ? 'enabled':'disabled'}</span>
      </div>
    </div>`).join('');
}

function selectAgent(slug) {
  activeSlug = slug;
  if (!histories[slug]) histories[slug] = [];
  renderSidebar();
  renderMain();
}

// ── Main ──────────────────────────────────────────────────────────────────────
function renderMain() {
  const agent = AGENTS.find(a => a.slug === activeSlug);
  document.getElementById('main').innerHTML = `
    <div class="chat-header">
      <div class="chat-header-icon">🤖</div>
      <div class="chat-header-info">
        <h2>${agent.name}</h2>
        <p>${agent.description}</p>
      </div>
      <div class="chat-header-badges">
        <span class="badge ${agent.enabled ? 'badge-enabled':'badge-disabled'}">${agent.enabled ? '● enabled':'○ disabled'}</span>
        <label class="dry-run-toggle">
          <input type="checkbox" ${dryRun?'checked':''} onchange="dryRun=this.checked"> dry-run
        </label>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <textarea id="msgInput" rows="1" placeholder="Ask the agent something…"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()">➤</button>
    </div>`;

  if (!histories[activeSlug].length) {
    const allowed = Object.entries(agent.allowed_tools||{}).map(([s,ops])=>`<b>${s}</b>: ${ops.join(', ')}`).join(' &nbsp;·&nbsp; ') || 'none';
    const denied  = Object.entries(agent.denied_tools ||{}).filter(([,v])=>v).map(([s,ops])=>`<b>${s}</b>: ${ops.join(', ')}`).join(' &nbsp;·&nbsp; ') || 'none';
    histories[activeSlug].push({
      role:'agent',
      html:`<b>👋 Hi! I'm ${agent.name}.</b><br><br>
        I run in <b>dry-run mode</b> — I'll show you exactly what I <em>would</em> do without touching anything real.<br><br>
        <span style="color:var(--green)">✓ Allowed:</span> ${allowed}<br>
        <span style="color:var(--red)">✗ Denied:</span> ${denied}`,
      planned:[],status:null,time:now()
    });
  }
  renderMessages();
  document.getElementById('msgInput').focus();
}

// ── Messages ──────────────────────────────────────────────────────────────────
function renderMessages() {
  const el = document.getElementById('messages');
  if (!el) return;
  el.innerHTML = (histories[activeSlug]||[]).map(m => {
    const avatar = m.role==='user'?'🧑':'🤖';
    const bubbleContent = m.html || escHtml(m.content||'');
    const extra = m.planned&&m.planned.length
      ? `<div class="planned-actions"><div class="pa-title">Planned actions</div>${m.planned.map(p=>`<div class="pa-item">${escHtml(p)}</div>`).join('')}</div>` : '';
    const chip  = m.status ? `<span class="status-chip status-${m.status}">${m.status.replace('_',' ')}</span>` : '';
    return `<div class="msg ${m.role}">
      <div class="msg-avatar">${avatar}</div>
      <div class="msg-body">
        <div class="msg-bubble">${bubbleContent}</div>${extra}
        <div style="display:flex;gap:8px;align-items:center">${chip}<span class="msg-time">${m.time||''}</span></div>
      </div></div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

// ── Send ──────────────────────────────────────────────────────────────────────
async function send() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text || !activeSlug) return;
  input.value = ''; autoResize(input);

  histories[activeSlug].push({role:'user',content:text,planned:[],status:null,time:now()});
  renderMessages();

  // Show typing
  histories[activeSlug].push({role:'agent',_typing:true,html:'<div class="typing"><span></span><span></span><span></span></div>',planned:[],time:''});
  renderMessages();

  await delay(600 + Math.random()*600);

  // Remove typing, add real reply
  histories[activeSlug] = histories[activeSlug].filter(m=>!m._typing);
  const agent  = AGENTS.find(a=>a.slug===activeSlug);
  const result = simulateWorkflow(agent, text);

  let html;
  if (result.planned_actions.length) {
    html = `<b>Dry run</b> — here's what I would do for: <em>${escHtml(text)}</em>`;
  } else {
    html = `<b>Dry run</b> — no specific actions mapped yet for: <em>${escHtml(text)}</em>`;
  }
  html += `<br><br><em style="color:var(--muted)">${escHtml(result.message)}</em>`;

  histories[activeSlug].push({role:'agent',html,planned:result.planned_actions,status:result.status,time:now()});
  renderMessages();
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }
function now() { return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Boot ──────────────────────────────────────────────────────────────────────
renderSidebar();
</script>
</body>
</html>
